<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rave Tech - Agentic Microsegmentation Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Animations */
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
        }
        @keyframes shield-flash {
            0% { box-shadow: 0 0 15px rgba(34, 211, 238, 0.6); border-color: #22d3ee; }
            50% { box-shadow: 0 0 40px rgba(34, 211, 238, 1); border-color: #fff; transform: scale(1.05); }
            100% { box-shadow: 0 0 15px rgba(34, 211, 238, 0.6); border-color: #22d3ee; transform: scale(1); }
        }
        @keyframes infection-wave {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(6); opacity: 0; }
        }

        .node-healthy { transition: all 0.4s ease; }
        
        /* Infected State */
        .node-infected {
            background-color: #ef4444 !important; /* text-red-500 */
            border-color: #dc2626 !important;
            animation: pulse-red 2s infinite;
        }

        /* Shielded State (Mesh Mode) */
        .node-shielded::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border: 2px dashed #22d3ee;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .node-shield-flash::before {
            animation: shield-flash 0.6s ease-out;
            border-style: solid;
            border-width: 4px;
        }

        /* The Infection Ripple */
        .infection-ripple {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(239,68,68,0.8) 0%, rgba(239,68,68,0) 70%);
            animation: infection-wave 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 0;
        }

        /* Network Lines */
        .network-line {
            transition: stroke 0.5s ease, stroke-dasharray 0.5s ease;
        }
        .line-legacy { stroke: #475569; stroke-width: 2; }
        .line-mesh { stroke: #1e293b; stroke-width: 2; stroke-dasharray: 5, 5; }
        .line-infected { stroke: #ef4444 !important; stroke-width: 3; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex flex-col items-center justify-center p-4 lg:p-8">

    <div class="max-w-5xl w-full bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col md:flex-row">
        
        <!-- Sidebar Controls -->
        <div class="w-full md:w-1/3 bg-slate-800 border-b md:border-b-0 md:border-r border-slate-700 p-6 flex flex-col justify-between z-10 relative">
            <div>
                <h1 class="text-2xl font-bold text-white mb-2 tracking-tight">Blast Radius <span class="text-cyan-400">Simulation</span></h1>
                <p class="text-sm text-slate-400 mb-8">Test how a single compromised AI agent impacts a shared Kubernetes cluster under different network models.</p>
                
                <h2 class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Network Architecture</h2>
                
                <div class="space-y-3">
                    <!-- Legacy Option -->
                    <label class="flex items-start cursor-pointer group">
                        <input type="radio" name="architecture" value="legacy" class="mt-1 sr-only" checked onchange="setMode('legacy')">
                        <div class="w-full p-3 rounded-lg border-2 border-slate-600 bg-slate-700/50 group-hover:border-slate-500 transition-colors" id="btn-legacy">
                            <div class="font-semibold text-white flex items-center">
                                <span class="w-3 h-3 rounded-full bg-slate-500 mr-2" id="dot-legacy"></span>
                                Legacy Trusted Network
                            </div>
                            <p class="text-xs text-slate-400 mt-1 pl-5">Agents in the same cluster are inherently trusted and can move laterally.</p>
                        </div>
                    </label>

                    <!-- Mesh Option -->
                    <label class="flex items-start cursor-pointer group">
                        <input type="radio" name="architecture" value="mesh" class="mt-1 sr-only" onchange="setMode('mesh')">
                        <div class="w-full p-3 rounded-lg border-2 border-slate-700 bg-slate-800/50 group-hover:border-slate-600 transition-colors" id="btn-mesh">
                            <div class="font-semibold text-white flex items-center">
                                <span class="w-3 h-3 rounded-full bg-slate-600 mr-2" id="dot-mesh"></span>
                                Rave Tech Microsegmentation
                            </div>
                            <p class="text-xs text-slate-400 mt-1 pl-5">Identity-based cryptographic isolation. Proximity does not equal trust.</p>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mt-8">
                <button onclick="resetSimulation()" class="w-full py-3 px-4 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 focus:ring-offset-slate-800">
                    Reset Simulation
                </button>
            </div>
        </div>

        <!-- Simulation Canvas -->
        <div class="w-full md:w-2/3 bg-[#0a0f1c] relative p-8 min-h-[500px] flex flex-col">
            
            <!-- Status Bar -->
            <div id="status-bar" class="absolute top-6 left-6 right-6 p-3 rounded-lg bg-slate-800/80 border border-slate-600 text-center text-sm font-medium text-slate-300 backdrop-blur-sm z-20 transition-colors">
                Click an agent below to simulate a prompt injection or malware compromise.
            </div>

            <!-- Cluster Container -->
            <div class="flex-grow relative mt-16 border border-slate-700/50 rounded-xl bg-slate-800/20">
                <div class="absolute top-3 left-3 text-xs text-slate-500 font-mono tracking-widest">SHARED K8S NAMESPACE</div>
                
                <!-- SVG Network Lines -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" id="network-lines">
                    <line x1="25%" y1="25%" x2="75%" y2="25%" class="network-line line-legacy" id="line-1" />
                    <line x1="25%" y1="25%" x2="25%" y2="75%" class="network-line line-legacy" id="line-2" />
                    <line x1="75%" y1="25%" x2="75%" y2="75%" class="network-line line-legacy" id="line-3" />
                    <line x1="25%" y1="75%" x2="75%" y2="75%" class="network-line line-legacy" id="line-4" />
                    <line x1="25%" y1="25%" x2="75%" y2="75%" class="network-line line-legacy" id="line-5" />
                    <line x1="25%" y1="75%" x2="75%" y2="25%" class="network-line line-legacy" id="line-6" />
                </svg>

                <!-- Agent Nodes -->
                <!-- Web Scraper (Top Left) -->
                <div class="agent-container absolute left-1/4 top-1/4 -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
                    <button onclick="triggerCompromise('web')" id="node-web" class="agent-node node-healthy w-16 h-16 rounded-full bg-slate-700 border-2 border-slate-500 flex items-center justify-center text-2xl shadow-lg hover:scale-110 relative outline-none focus:ring-2 focus:ring-white">
                        🌐
                    </button>
                    <div class="mt-3 bg-slate-900/80 px-2 py-1 rounded text-xs font-semibold border border-slate-700">Web Agent</div>
                </div>

                <!-- HR Agent (Top Right) -->
                <div class="agent-container absolute left-3/4 top-1/4 -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
                    <button onclick="triggerCompromise('hr')" id="node-hr" class="agent-node node-healthy w-16 h-16 rounded-full bg-slate-700 border-2 border-slate-500 flex items-center justify-center text-2xl shadow-lg hover:scale-110 relative outline-none focus:ring-2 focus:ring-white">
                        👔
                    </button>
                    <div class="mt-3 bg-slate-900/80 px-2 py-1 rounded text-xs font-semibold border border-slate-700">HR Agent</div>
                </div>

                <!-- Database Agent (Bottom Left) -->
                <div class="agent-container absolute left-1/4 top-3/4 -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
                    <button onclick="triggerCompromise('db')" id="node-db" class="agent-node node-healthy w-16 h-16 rounded-full bg-slate-700 border-2 border-slate-500 flex items-center justify-center text-2xl shadow-lg hover:scale-110 relative outline-none focus:ring-2 focus:ring-white">
                        🗄️
                    </button>
                    <div class="mt-3 bg-slate-900/80 px-2 py-1 rounded text-xs font-semibold border border-slate-700">DB Agent</div>
                </div>

                <!-- Finance Agent (Bottom Right) -->
                <div class="agent-container absolute left-3/4 top-3/4 -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
                    <button onclick="triggerCompromise('finance')" id="node-finance" class="agent-node node-healthy w-16 h-16 rounded-full bg-slate-700 border-2 border-slate-500 flex items-center justify-center text-2xl shadow-lg hover:scale-110 relative outline-none focus:ring-2 focus:ring-white">
                        💰
                    </button>
                    <div class="mt-3 bg-slate-900/80 px-2 py-1 rounded text-xs font-semibold border border-slate-700">Finance Agent</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'legacy';
        let simulationActive = false;
        
        const nodes = ['web', 'hr', 'db', 'finance'];
        const lineElements = document.querySelectorAll('.network-line');

        function setMode(mode) {
            currentMode = mode;
            
            // Update UI Sidebar selection styling
            const btnLegacy = document.getElementById('btn-legacy');
            const btnMesh = document.getElementById('btn-mesh');
            const dotLegacy = document.getElementById('dot-legacy');
            const dotMesh = document.getElementById('dot-mesh');

            if(mode === 'legacy') {
                btnLegacy.className = 'w-full p-3 rounded-lg border-2 border-cyan-500 bg-cyan-900/20 transition-colors';
                btnMesh.className = 'w-full p-3 rounded-lg border-2 border-slate-700 bg-slate-800/50 group-hover:border-slate-600 transition-colors';
                dotLegacy.className = 'w-3 h-3 rounded-full bg-cyan-400 mr-2 shadow-[0_0_8px_#22d3ee]';
                dotMesh.className = 'w-3 h-3 rounded-full bg-slate-600 mr-2';
            } else {
                btnMesh.className = 'w-full p-3 rounded-lg border-2 border-cyan-500 bg-cyan-900/20 transition-colors';
                btnLegacy.className = 'w-full p-3 rounded-lg border-2 border-slate-600 bg-slate-700/50 group-hover:border-slate-500 transition-colors';
                dotMesh.className = 'w-3 h-3 rounded-full bg-cyan-400 mr-2 shadow-[0_0_8px_#22d3ee]';
                dotLegacy.className = 'w-3 h-3 rounded-full bg-slate-500 mr-2';
            }

            resetSimulation();
        }

        function triggerCompromise(targetId) {
            if (simulationActive) return;
            simulationActive = true;

            const targetNode = document.getElementById(`node-${targetId}`);
            const statusBar = document.getElementById('status-bar');

            // 1. Mark target as infected immediately
            targetNode.classList.remove('bg-slate-700', 'border-slate-500');
            targetNode.classList.add('node-infected');
            
            // Append visual ripple effect
            const ripple = document.createElement('div');
            ripple.className = 'infection-ripple';
            targetNode.appendChild(ripple);

            statusBar.innerText = 'Threat detected! Payload attempting to spread...';
            statusBar.className = 'absolute top-6 left-6 right-6 p-3 rounded-lg bg-orange-900/80 border border-orange-500 text-center text-sm font-medium text-orange-200 backdrop-blur-sm z-20';

            setTimeout(() => {
                if (currentMode === 'legacy') {
                    // Legacy: Infection spreads to everything
                    lineElements.forEach(line => {
                        line.classList.remove('line-legacy');
                        line.classList.add('line-infected');
                    });

                    nodes.forEach(id => {
                        if (id !== targetId) {
                            const node = document.getElementById(`node-${id}`);
                            node.classList.remove('bg-slate-700', 'border-slate-500');
                            node.classList.add('node-infected');
                        }
                    });

                    statusBar.innerText = 'CRITICAL BREACH: Proximity allowed lateral movement across the entire cluster!';
                    statusBar.className = 'absolute top-6 left-6 right-6 p-3 rounded-lg bg-red-900/90 border border-red-500 text-center text-sm font-bold text-white shadow-[0_0_15px_#ef4444] backdrop-blur-sm z-20';
                } 
                else if (currentMode === 'mesh') {
                    // Mesh: Infection is blocked by shields
                    nodes.forEach(id => {
                        if (id !== targetId) {
                            const node = document.getElementById(`node-${id}`);
                            // Trigger the shield flash animation
                            node.classList.add('node-shield-flash');
                            setTimeout(() => {
                                node.classList.remove('node-shield-flash');
                            }, 600);
                        }
                    });

                    statusBar.innerText = 'SECURE: Lateral movement blocked by identity-based isolation.';
                    statusBar.className = 'absolute top-6 left-6 right-6 p-3 rounded-lg bg-cyan-900/90 border border-cyan-400 text-center text-sm font-bold text-white shadow-[0_0_15px_#22d3ee] backdrop-blur-sm z-20';
                    
                    // Remove ripple after animation
                    setTimeout(() => ripple.remove(), 800);
                }
            }, 700);
        }

        function resetSimulation() {
            simulationActive = false;
            const statusBar = document.getElementById('status-bar');
            
            // Reset status bar
            statusBar.innerText = 'Click an agent below to simulate a prompt injection or malware compromise.';
            statusBar.className = 'absolute top-6 left-6 right-6 p-3 rounded-lg bg-slate-800/80 border border-slate-600 text-center text-sm font-medium text-slate-300 backdrop-blur-sm z-20 transition-colors';

            // Reset lines
            lineElements.forEach(line => {
                line.classList.remove('line-legacy', 'line-mesh', 'line-infected');
                line.classList.add(currentMode === 'legacy' ? 'line-legacy' : 'line-mesh');
            });

            // Reset nodes
            nodes.forEach(id => {
                const node = document.getElementById(`node-${id}`);
                node.className = 'agent-node node-healthy w-16 h-16 rounded-full bg-slate-700 border-2 border-slate-500 flex items-center justify-center text-2xl shadow-lg hover:scale-110 relative outline-none focus:ring-2 focus:ring-white';
                
                // Add shields if in mesh mode
                if (currentMode === 'mesh') {
                    node.classList.add('node-shielded');
                }
                
                // Clear any leftover ripples
                const ripples = node.querySelectorAll('.infection-ripple');
                ripples.forEach(r => r.remove());
            });
        }

        // Initialize default view
        setMode('legacy');
    </script>
</body>
</html>
