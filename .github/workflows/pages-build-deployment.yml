name: pages-build-deployment

on:
  workflow_run:
    workflows:
      - Brand rewrite
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-build-deployment
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out rebranded main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify brand rewrite is complete
        run: |
          python3 .github/scripts/rewrite_brand.py
          if ! git diff --quiet --exit-code; then
            echo "Brand rewrite was not complete before deployment."
            git diff --stat
            exit 1
          fi

      - name: Prepare static site artifact
        run: |
          mkdir -p _site
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
