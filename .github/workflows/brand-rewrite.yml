name: Brand rewrite

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: brand-rewrite-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rewrite:
    name: Rewrite brand references
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rewrite repository text and paths
        run: python3 .github/scripts/rewrite_brand.py

      - name: Commit rewrite
        run: |
          if git diff --quiet --exit-code; then
            echo "No rewrite needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply brand rewrite"
          git push
