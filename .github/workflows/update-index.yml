name: Update demo index

on:
  workflow_run:
    workflows:
      - Brand rewrite
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Regenerate index.html
        run: python3 scripts/update_index.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}

      - name: Commit updated index
        run: |
          if git diff --quiet -- index.html scripts/demo_metadata.json; then
            echo "index.html and demo metadata are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/demo_metadata.json
          git commit -m "Update demo index"
          git push origin HEAD:main
